name: Build ISO

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run build script
        run: |
          chmod +x ./build-workflow.sh
          ./build-workflow.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: iso
          path: output/*.iso
